<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRK Grow Zone Map Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="range"] { accent-color: #10b981; }
        .tool-active { border-color: #10b981 !important; background-color: #f0fdf4 !important; color: #047857 !important; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }
        .canvas-container { 
            width: 1100px; 
            height: 750px; 
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px); 
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center z-30 shadow-sm">
        <div class="flex items-center gap-4">
            <!-- Company Logo -->
            <img id="headerLogo" src="Small-BC-logo.png" alt="Logo" class="h-10 w-auto" onerror="this.src='https://jrkmapmaker.netlify.app/Small-BC-logo.png'">
            <div>
                <h1 class="text-lg font-bold text-slate-800 leading-tight">JRK Grow Zone Map Builder</h1>
            </div>
        </div>
        
        <div class="flex gap-2 items-center">
            <div class="flex border-r border-slate-200 pr-3 mr-1 gap-1">
                <button id="undoBtn" onclick="undo()" class="p-2 rounded-lg text-slate-200 transition-all" disabled title="Undo (Ctrl+Z)">
                    <i data-lucide="undo-2"></i>
                </button>
                <button id="redoBtn" onclick="redo()" class="p-2 rounded-lg text-slate-200 transition-all" disabled title="Redo (Ctrl+Y)">
                    <i data-lucide="redo-2"></i>
                </button>
            </div>
            <button onclick="resetAll()" class="flex items-center gap-2 px-4 py-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all text-sm font-semibold">
                <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                Reset Map
            </button>
            <button onclick="exportMap()" class="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-6 py-2.5 rounded-lg transition-all font-bold text-sm shadow-md ml-2">
                <i data-lucide="download" class="w-5 h-5"></i>
                Download Map
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-52 bg-white border-r border-slate-200 p-4 flex flex-col gap-6 shadow-xl z-20">
            <section>
                <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-3 text-center">Mode Selection</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button id="drawTool" onclick="setTool('draw')" class="tool-active flex items-center gap-3 px-4 py-3 rounded-xl border-2 transition-all">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                        <span class="text-[10px] font-bold uppercase">Draw Area</span>
                    </button>
                    <button id="eraseTool" onclick="setTool('erase')" class="flex items-center gap-3 px-4 py-3 rounded-xl border-2 border-slate-50 hover:border-slate-200 text-slate-400 transition-all">
                        <i data-lucide="eraser" class="w-4 h-4"></i>
                        <span class="text-[10px] font-bold uppercase">Erase Area</span>
                    </button>
                    <button id="inspectTool" onclick="setTool('inspect')" class="flex items-center gap-3 px-4 py-3 rounded-xl border-2 border-slate-50 hover:border-slate-200 text-slate-400 transition-all">
                        <i data-lucide="mouse-pointer-2" class="w-4 h-4"></i>
                        <span class="text-[10px] font-bold uppercase">Inspect</span>
                    </button>
                </div>
            </section>

            <section class="space-y-4">
                <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Zone Styling</h3>
                <div class="bg-slate-50 p-3.5 rounded-2xl border border-slate-100 space-y-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 flex items-center gap-2 uppercase">
                            <i data-lucide="palette" class="w-3 h-3 text-emerald-500"></i> Color
                        </label>
                        <div class="flex gap-2">
                            <div class="w-10 h-8 rounded-lg overflow-hidden shadow-sm border border-slate-200 relative shrink-0">
                                <input id="colorPicker" type="color" value="#20462d" oninput="updateCurrentStyle()" class="absolute inset-0 w-[150%] h-[150%] -translate-x-1/4 -translate-y-1/4 cursor-pointer">
                            </div>
                            <input id="colorText" type="text" value="#20462D" oninput="updateFromText(this.value)" class="w-full px-2 py-1.5 text-[11px] border border-slate-200 rounded-lg outline-none font-mono uppercase">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Opacity</label>
                            <span id="opacityLabel" class="text-[9px] font-black text-emerald-600 bg-emerald-100 px-1.5 py-0.5 rounded-full">55%</span>
                        </div>
                        <input id="opacityPicker" type="range" min="0.1" max="1.0" step="0.05" value="0.55" oninput="updateCurrentStyle()" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </section>

            <!-- Bottom Logo Placement -->
            <section class="mt-auto pt-4 border-t border-slate-100 flex justify-center">
                <img src="Full-BC-logo.png" alt="Full Logo" class="w-full h-auto opacity-80" onerror="this.src='https://jrkmapmaker.netlify.app/Full-BC-logo.png'">
            </section>
        </aside>

        <!-- Workspace -->
        <section class="flex-1 bg-slate-100 flex items-center justify-center p-4 relative overflow-auto">
            <div class="relative p-2 bg-white rounded-2xl shadow-2xl border border-white">
                <div id="workspace" class="relative bg-slate-50 overflow-hidden rounded-xl select-none cursor-crosshair canvas-container">
                    
                    <!-- Base Map -->
                    <img id="baseMap" src="us-48.png" class="absolute pointer-events-none z-0 grayscale-[0.3] opacity-90" style="left: 150px; top: 125px; width: 800px; height: 500px;" onload="onMapLoaded(this.src)" onerror="onMapError(this)">

                    <!-- Interaction SVG -->
                    <svg id="mainSvg" class="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 1100 750">
                        <defs>
                            <mask id="us-mask" maskContentUnits="userSpaceOnUse">
                                <image id="maskImage" href="us-48.png" x="150" y="125" width="800" height="500" preserveAspectRatio="none" />
                            </mask>
                            <mask id="exclusion-mask" maskContentUnits="userSpaceOnUse">
                                <rect x="0" y="0" width="100%" height="100%" fill="white" />
                                <g id="eraserGroup"></g>
                            </mask>
                        </defs>
                        
                        <!-- Opacity is applied to the GROUP level to allow overlapping strokes to merge perfectly -->
                        <g id="zoneGroup" opacity="0.55">
                            <g mask="url(#us-mask)">
                                <g mask="url(#exclusion-mask)" id="pathContainer">
                                    <!-- Individual paths are rendered here -->
                                </g>
                            </g>
                        </g>

                        <polyline id="feedbackLine" points="" fill="none" stroke="#20462D" stroke-width="2.5" stroke-dasharray="5 3" />
                    </svg>
                </div>
            </div>

            <!-- Indicator -->
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-6 px-8 py-3 bg-white/80 backdrop-blur shadow-sm border border-slate-200 rounded-full">
                <div class="flex items-center gap-2">
                   <div id="statusDot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                   <span id="statusText" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Addition Mode</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        const WORKSPACE_WIDTH = 1100;
        const WORKSPACE_HEIGHT = 750;
        const MAP_WIDTH = 800;
        const MAP_HEIGHT = 500;
        const MAP_X = 150;
        const MAP_Y = 125;
        const FALLBACK_URL = 'https://chirpquiz.netlify.app/us-48.png';

        // State
        let drawnPaths = []; 
        let eraserPaths = [];
        let history = [{ drawnPaths: [], eraserPaths: [] }];
        let historyStep = 0;
        let isDrawing = false;
        let currentPoints = [];
        let currentTool = 'draw';

        const workspace = document.getElementById('workspace');
        const feedbackLine = document.getElementById('feedbackLine');
        const zoneGroup = document.getElementById('zoneGroup');
        const pathContainer = document.getElementById('pathContainer');
        const eraserGroup = document.getElementById('eraserGroup');
        const maskImage = document.getElementById('maskImage');
        const colorPicker = document.getElementById('colorPicker');
        const colorText = document.getElementById('colorText');
        const opacityPicker = document.getElementById('opacityPicker');
        const opacityLabel = document.getElementById('opacityLabel');

        lucide.createIcons();

        function onMapLoaded(src) {
            maskImage.setAttribute('href', src);
        }

        function onMapError(img) {
            if (img.src !== FALLBACK_URL) {
                img.src = FALLBACK_URL;
                maskImage.setAttribute('href', FALLBACK_URL);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') { e.preventDefault(); undo(); }
                if (e.key === 'y') { e.preventDefault(); redo(); }
            }
        });

        workspace.addEventListener('mousedown', (e) => {
            if (currentTool === 'inspect') return;
            isDrawing = true;
            const rect = workspace.getBoundingClientRect();
            currentPoints = [{ x: e.clientX - rect.left, y: e.clientY - rect.top }];
            updateFeedback();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = workspace.getBoundingClientRect();
            currentPoints.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
            updateFeedback();
        });

        window.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPoints.length > 3) {
                const path = getSmoothingPath(currentPoints);
                if (path) {
                    if (currentTool === 'draw') {
                        drawnPaths.push(path);
                    } else if (currentTool === 'erase') {
                        eraserPaths.push(path);
                    }
                    saveHistory();
                    render();
                }
            }
            currentPoints = [];
            updateFeedback();
        });

        function setTool(tool) {
            currentTool = tool;
            ['drawTool', 'eraseTool', 'inspectTool'].forEach(id => document.getElementById(id).classList.remove('tool-active'));
            document.getElementById(tool + 'Tool').classList.add('tool-active');
            workspace.style.cursor = tool === 'inspect' ? 'default' : 'crosshair';
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            if (tool === 'draw') { statusText.innerText = 'Addition Mode'; statusDot.className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse'; }
            if (tool === 'erase') { statusText.innerText = 'Subtraction Mode'; statusDot.className = 'w-2 h-2 rounded-full bg-red-500 animate-pulse'; }
            if (tool === 'inspect') { statusText.innerText = 'Inspection Mode'; statusDot.className = 'w-2 h-2 rounded-full bg-slate-300'; }
        }

        function updateFeedback() {
            if (currentPoints.length > 1) {
                feedbackLine.setAttribute('points', currentPoints.map(p => `${p.x},${p.y}`).join(' '));
                feedbackLine.setAttribute('stroke', currentTool === 'erase' ? '#ef4444' : colorPicker.value);
                feedbackLine.setAttribute('stroke-dasharray', currentTool === 'erase' ? '2 2' : '5 3');
            } else {
                feedbackLine.setAttribute('points', '');
            }
        }

        function getSmoothingPath(points) {
            if (points.length < 3) return "";
            let d = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < points.length - 2; i++) {
                const xc = (points[i].x + points[i + 1].x) / 2;
                const yc = (points[i].y + points[i + 1].y) / 2;
                d += ` Q ${points[i].x} ${points[i].y}, ${xc} ${yc}`;
            }
            d += ` Q ${points[points.length - 2].x} ${points[points.length - 2].y}, ${points[points.length - 1].x} ${points[points.length - 1].y} Z`;
            return d;
        }

        function render() {
            // Render individual paths at full opacity inside the container
            // This ensures overlapping strokes merge instead of subtracting
            pathContainer.innerHTML = drawnPaths.map(d => 
                `<path d="${d}" fill="${colorPicker.value}" fill-opacity="1" />`
            ).join('');

            // Apply opacity to the whole group
            zoneGroup.setAttribute('opacity', opacityPicker.value);

            // Render erasers in the exclusion mask
            eraserGroup.innerHTML = eraserPaths.map(p => `<path d="${p}" fill="black" />`).join('');

            updateHistoryButtons();
        }

        function updateCurrentStyle() {
            colorText.value = colorPicker.value.toUpperCase();
            opacityLabel.innerText = Math.round(opacityPicker.value * 100) + '%';
            render();
        }

        function updateFromText(val) {
            if (/^#[0-9A-F]{6}$/i.test(val)) {
                colorPicker.value = val;
                updateCurrentStyle();
            }
        }

        function saveHistory() {
            history = history.slice(0, historyStep + 1);
            history.push({
                drawnPaths: [...drawnPaths],
                eraserPaths: [...eraserPaths]
            });
            historyStep++;
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                const state = history[historyStep];
                drawnPaths = [...state.drawnPaths];
                eraserPaths = [...state.eraserPaths];
                render();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                const state = history[historyStep];
                drawnPaths = [...state.drawnPaths];
                eraserPaths = [...state.eraserPaths];
                render();
            }
        }

        function updateHistoryButtons() {
            const u = document.getElementById('undoBtn');
            const r = document.getElementById('redoBtn');
            u.disabled = historyStep === 0;
            r.disabled = historyStep === history.length - 1;
            u.classList.toggle('text-slate-200', u.disabled);
            u.classList.toggle('text-slate-500', !u.disabled);
            r.classList.toggle('text-slate-200', r.disabled);
            r.classList.toggle('text-slate-500', !r.disabled);
        }

        function resetAll() {
            if (confirm("Reset the grow zone? This cannot be undone.")) {
                drawnPaths = [];
                eraserPaths = [];
                saveHistory();
                render();
            }
        }

        function exportMap() {
            const baseImg = document.getElementById('baseMap');
            const EXPORT_WIDTH = 1600;
            const EXPORT_HEIGHT = 1000;
            const scaleX = EXPORT_WIDTH / MAP_WIDTH;
            const scaleY = EXPORT_HEIGHT / MAP_HEIGHT;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = EXPORT_WIDTH;
            canvas.height = EXPORT_HEIGHT;
            ctx.drawImage(baseImg, 0, 0, EXPORT_WIDTH, EXPORT_HEIGHT);

            const sCanvas = document.createElement('canvas');
            sCanvas.width = EXPORT_WIDTH;
            sCanvas.height = EXPORT_HEIGHT;
            const sCtx = sCanvas.getContext('2d');
            sCtx.scale(scaleX, scaleY);
            sCtx.translate(-MAP_X, -MAP_Y);

            // Draw paths at 1.0 opacity on the scratch canvas
            sCtx.fillStyle = colorPicker.value;
            drawnPaths.forEach(d => {
                const p = new Path2D(d);
                sCtx.fill(p);
            });

            // Subtract erasers
            sCtx.globalCompositeOperation = 'destination-out';
            eraserPaths.forEach(pathStr => {
                const ep = new Path2D(pathStr);
                sCtx.fill(ep);
            });

            // Land Lock masking
            sCtx.setTransform(1, 0, 0, 1, 0, 0); 
            sCtx.globalCompositeOperation = 'destination-in';
            sCtx.drawImage(baseImg, 0, 0, EXPORT_WIDTH, EXPORT_HEIGHT);

            // Now draw the scratch canvas to main canvas with the desired transparency
            ctx.globalAlpha = parseFloat(opacityPicker.value);
            ctx.drawImage(sCanvas, 0, 0);
            ctx.globalAlpha = 1.0;

            try {
                const url = canvas.toDataURL("image/png");
                const a = document.createElement('a');
                a.href = url;
                a.download = `jrk-grow-zone-${Date.now()}.png`;
                a.click();
            } catch (e) {
                console.error("Download failed:", e);
            }
        }

        render();
    </script>
</body>
</html>
