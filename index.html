<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grass Seed Zone Mapper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --panel: #1a1a18;
    --panel-light: #2a2a26;
    --accent: #4a7c59;
    --accent2: #c8a951;
    --text: #1a1a18;
    --text-muted: #888880;
    --border: #d8d4c8;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--panel);
    color: #f5f2eb;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 2px solid var(--accent);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.25rem;
    letter-spacing: -0.01em;
    color: #f5f2eb;
  }

  header .tagline {
    font-size: 0.7rem;
    color: #888880;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 240px;
    background: var(--panel);
    color: #f5f2eb;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid #333330;
  }

  .sidebar-section h3 {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 12px;
    background: transparent;
    border: 1px solid #444440;
    border-radius: 4px;
    color: #ccc;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    margin-bottom: 6px;
    transition: all 0.15s;
    text-align: left;
  }

  .tool-btn:hover { background: #333330; border-color: #666; color: #fff; }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tool-btn svg { flex-shrink: 0; opacity: 0.8; }

  label.field-label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #888880;
    margin-bottom: 6px;
    margin-top: 10px;
  }

  input[type="color"] {
    width: 100%;
    height: 36px;
    border: 1px solid #444440;
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    padding: 2px;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    margin-top: 4px;
  }

  .opacity-val {
    font-size: 0.7rem;
    color: #888;
    text-align: right;
    margin-top: 2px;
  }

  .zone-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    background: #2a2a26;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.12s;
    font-size: 0.72rem;
  }

  .zone-item:hover { border-color: #555; }
  .zone-item.active-zone { border-color: var(--accent); background: #1e2e22; }

  .zone-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .zone-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #ccc;
  }

  .zone-del {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 0.85rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 2px;
    transition: color 0.12s;
  }
  .zone-del:hover { color: #e55; }

  .add-zone-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px dashed #444;
    border-radius: 4px;
    color: #666;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.15s;
  }
  .add-zone-btn:hover { border-color: var(--accent); color: var(--accent); }

  .action-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    margin-bottom: 6px;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d6b4a; }
  .btn-secondary { background: #333330; color: #ccc; border: 1px solid #444440; }
  .btn-secondary:hover { background: #3a3a36; color: #fff; }
  .btn-danger { background: transparent; color: #c05; border: 1px solid #c05; }
  .btn-danger:hover { background: #c05; color: #fff; }
  .tool-btn.erase-active { background: #8b2020; border-color: #c03030; color: #fff; }

  .map-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #e8e4d8;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(74,124,89,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(200,169,81,0.05) 0%, transparent 50%);
  }

  #map-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #base-map {
    position: absolute;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
  }

  #drawing-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  #drawing-canvas.pan-mode { cursor: grab; }
  #drawing-canvas.pan-mode:active { cursor: grabbing; }

  .status-bar {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,26,24,0.85);
    color: #aaa;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    backdrop-filter: blur(4px);
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .legend {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    min-width: 130px;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .legend h4 {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 0.7rem;
    color: var(--text);
  }

  .legend-swatch {
    width: 18px;
    height: 10px;
    border-radius: 2px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--panel);
    color: #f5f2eb;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 0.75rem;
    border-left: 3px solid var(--accent);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🌿 GrowZone Mapper</h1>
    <div class="tagline">Grass Seed Regional Planning Tool</div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sidebar-section">
      <h3>Tools</h3>
      <button class="tool-btn active" id="btn-draw" onclick="setTool('draw')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        Draw Region
      </button>
      <button class="tool-btn" id="btn-erase" onclick="setTool('erase')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.5 17.5l5-5"/></svg>
        Erase Region
      </button>
      <button class="tool-btn" id="btn-pan" onclick="setTool('pan')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        Pan / Navigate
      </button>
    </div>

    <div class="sidebar-section">
      <h3>Active Zone Style</h3>
      <label class="field-label">Fill Color</label>
      <input type="color" id="color-pick" value="#4a7c59" oninput="updateActiveZoneStyle()">

      <label class="field-label">Opacity</label>
      <input type="range" id="opacity-range" min="10" max="90" value="55" oninput="updateOpacityLabel(); updateActiveZoneStyle()">
      <div class="opacity-val" id="opacity-label">55%</div>

      <label class="field-label">Stroke</label>
      <input type="range" id="stroke-range" min="1" max="5" value="2" step="0.5" oninput="updateActiveZoneStyle()">
    </div>

    <div class="sidebar-section" style="flex:1">
      <h3>Zones</h3>
      <div id="zones-list"></div>
      <button class="add-zone-btn" onclick="addZone()">+ New Zone</button>
    </div>

    <div class="sidebar-section">
      <h3>Actions</h3>
      <button class="action-btn btn-primary" onclick="exportPNG()">⬇ Export PNG</button>
      <button class="action-btn btn-secondary" onclick="undoLast()">↩ Undo Last</button>
      <button class="action-btn btn-danger" onclick="clearAll()">✕ Clear All</button>
    </div>

  </div>

  <div class="map-area">
    <div id="map-container">
      <img id="base-map" src="us-48.png" alt="US 48 States Map" draggable="false" crossorigin="anonymous">
      <canvas id="drawing-canvas"></canvas>
    </div>
    <div class="status-bar" id="status-bar">Click and drag to draw a region</div>
    <div class="legend" id="map-legend" style="display:none">
      <h4>Legend</h4>
      <div id="legend-items"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('drawing-canvas');
const ctx = canvas.getContext('2d');
const img = document.getElementById('base-map');
const container = document.getElementById('map-container');

// Offscreen canvas: holds the map scaled to display size, used as a land mask
const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d');
let maskReady = false;

let tool = 'draw';
let isDrawing = false;
let currentPath = [];
let zones = [];
let activeZoneIdx = 0;

let pan = { x: 0, y: 0 };
let panStart = { x: 0, y: 0 };
let panOrigin = { x: 0, y: 0 };

let imgBounds = { x: 0, y: 0, w: 0, h: 0 };

const defaultColors = ['#4a7c59','#c8a951','#3a7abf','#c0522e','#7a4abf','#bf4a7a'];

function createZone(name, color) {
  return {
    name: name || `Zone ${zones.length + 1}`,
    color: color || defaultColors[zones.length % defaultColors.length],
    opacity: 55,
    stroke: 2,
    paths: [],
    erasePaths: []
  };
}

// ── Init ───────────────────────────────────────────────────────────────────
function buildMask() {
  // Draw the map image into an offscreen canvas at the same display size.
  // The map is white land on black background — we use this as a clipping mask.
  maskCanvas.width = canvas.width;
  maskCanvas.height = canvas.height;
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
  if (img.naturalWidth && imgBounds.w) {
    maskCtx.drawImage(img, imgBounds.x + pan.x, imgBounds.y + pan.y, imgBounds.w, imgBounds.h);
  }
  maskReady = true;
}

img.onload = () => { resizeCanvas(); addZone(); };
img.onerror = () => { resizeCanvas(); addZone(); };
if (img.complete && img.naturalWidth) { resizeCanvas(); addZone(); }

window.addEventListener('resize', () => { resizeCanvas(); render(); });

function resizeCanvas() {
  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;
  computeImgBounds();
  buildMask();
  render();
}

function computeImgBounds() {
  if (!img.naturalWidth) return;
  const cw = canvas.width, ch = canvas.height;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.min(cw / iw, ch / ih);
  const w = iw * scale, h = ih * scale;
  imgBounds = { x: (cw - w) / 2, y: (ch - h) / 2, w, h, scale };
}

// ── Zones UI ───────────────────────────────────────────────────────────────
function addZone() {
  zones.push(createZone());
  activeZoneIdx = zones.length - 1;
  renderZonesList();
  syncControls();
}

function deleteZone(i) {
  zones.splice(i, 1);
  if (!zones.length) zones.push(createZone());
  activeZoneIdx = Math.min(activeZoneIdx, zones.length - 1);
  renderZonesList();
  syncControls();
  render();
}

function selectZone(i) {
  activeZoneIdx = i;
  syncControls();
  renderZonesList();
}

function renderZonesList() {
  const list = document.getElementById('zones-list');
  list.innerHTML = '';
  zones.forEach((z, i) => {
    const el = document.createElement('div');
    el.className = 'zone-item' + (i === activeZoneIdx ? ' active-zone' : '');
    el.innerHTML = `
      <div class="zone-swatch" style="background:${z.color}"></div>
      <span class="zone-name" contenteditable="true" onfocus="event.stopPropagation()"
        onblur="zones[${i}].name=this.textContent.trim();updateLegend()">${z.name}</span>
      <button class="zone-del" onclick="event.stopPropagation();deleteZone(${i})">×</button>`;
    el.addEventListener('click', () => selectZone(i));
    list.appendChild(el);
  });
  updateLegend();
}

function syncControls() {
  const z = zones[activeZoneIdx];
  if (!z) return;
  document.getElementById('color-pick').value = z.color;
  document.getElementById('opacity-range').value = z.opacity;
  document.getElementById('stroke-range').value = z.stroke;
  updateOpacityLabel();
}

function updateActiveZoneStyle() {
  const z = zones[activeZoneIdx];
  if (!z) return;
  z.color = document.getElementById('color-pick').value;
  z.opacity = parseInt(document.getElementById('opacity-range').value);
  z.stroke = parseFloat(document.getElementById('stroke-range').value);
  renderZonesList();
  render();
}

function updateOpacityLabel() {
  document.getElementById('opacity-label').textContent = document.getElementById('opacity-range').value + '%';
}

// ── Tools ──────────────────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.getElementById('btn-draw').classList.toggle('active', t === 'draw');
  document.getElementById('btn-pan').classList.toggle('active', t === 'pan');
  document.getElementById('btn-erase').classList.toggle('active', t === 'erase');
  document.getElementById('btn-erase').classList.toggle('erase-active', t === 'erase');
  canvas.className = t === 'pan' ? 'pan-mode' : '';
  setStatus(t === 'draw' ? 'Click and drag to draw a region' :
            t === 'erase' ? 'Draw over filled areas to erase them' :
            'Drag to pan the map');
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ── Drawing ────────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  if (tool === 'pan') { panStart = { x: e.clientX, y: e.clientY }; panOrigin = { ...pan }; isDrawing = true; return; }
  isDrawing = true;
  currentPath = [getPoint(e)];
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDrawing) return;
  if (tool === 'pan') {
    pan.x = panOrigin.x + (e.clientX - panStart.x);
    pan.y = panOrigin.y + (e.clientY - panStart.y);
    applyPan();
    return;
  }
  currentPath.push(getPoint(e));
  render();
  renderCurrentPath();
});

canvas.addEventListener('mouseup', () => {
  if (!isDrawing) return;
  isDrawing = false;
  if (tool === 'pan') return;
  if (currentPath.length > 2) {
    currentPath.push(currentPath[0]);
    const saved = smoothPath([...currentPath]);
    if (tool === 'erase') {
      zones[activeZoneIdx].erasePaths.push(saved);
    } else {
      zones[activeZoneIdx].paths.push(saved);
      updateLegend();
    }
  }
  currentPath = [];
  render();
});

canvas.addEventListener('mouseleave', () => {
  if (isDrawing && (tool === 'draw' || tool === 'erase') && currentPath.length > 2) {
    currentPath.push(currentPath[0]);
    const saved = smoothPath([...currentPath]);
    if (tool === 'erase') {
      zones[activeZoneIdx].erasePaths.push(saved);
    } else {
      zones[activeZoneIdx].paths.push(saved);
      updateLegend();
    }
    currentPath = [];
    isDrawing = false;
    render();
  }
});

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); simulateMouse('mousedown', e.touches[0]); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); simulateMouse('mousemove', e.touches[0]); }, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); }, { passive: false });

function simulateMouse(type, touch) {
  canvas.dispatchEvent(new MouseEvent(type, { clientX: touch.clientX, clientY: touch.clientY }));
}

function getPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function applyPan() {
  img.style.transform = `translate(${pan.x}px, ${pan.y}px)`;
  buildMask();
  render();
}

// ── Smoothing ─────────────────────────────────────────────────────────────
function smoothPath(pts) {
  if (pts.length < 3) return pts;
  const step = Math.max(1, Math.floor(pts.length / 200));
  return pts.filter((_, i) => i % step === 0);
}

// Draw a smoothed quadratic bezier path onto a given context
function buildSmoothedPath(c, pts) {
  if (pts.length < 2) return;
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 2; i++) {
    const xc = (pts[i].x + pts[i + 1].x) / 2;
    const yc = (pts[i].y + pts[i + 1].y) / 2;
    c.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
  }
  const last = pts[pts.length - 1];
  const prev = pts[pts.length - 2];
  c.quadraticCurveTo(prev.x, prev.y, last.x, last.y);
}

// ── Land Mask Clipping ─────────────────────────────────────────────────────
// Renders a zone path clipped to land pixels only, using the map as a mask.
// Strategy:
//   1. Draw the filled/stroked zone onto a temp canvas
//   2. Use 'destination-in' composite with the map image so only land shows
//   3. Blit the result onto the main canvas
function renderZoneWithLandClip(pts, fillColor, strokeColor, strokeWidth, erasePaths) {
  if (pts.length < 2) return;

  const tmp = document.createElement('canvas');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  const tc = tmp.getContext('2d');

  // 1. Draw the filled shape
  buildSmoothedPath(tc, pts);
  tc.closePath();
  tc.fillStyle = fillColor;
  tc.fill();

  // 2. Draw the stroke on top
  buildSmoothedPath(tc, pts);
  tc.closePath();
  tc.strokeStyle = strokeColor;
  tc.lineWidth = strokeWidth;
  tc.lineJoin = 'round';
  tc.lineCap = 'round';
  tc.stroke();

  // 3. Punch out erase paths using destination-out
  if (erasePaths && erasePaths.length) {
    tc.globalCompositeOperation = 'destination-out';
    erasePaths.forEach(ep => {
      if (ep.length < 2) return;
      buildSmoothedPath(tc, ep);
      tc.closePath();
      tc.fillStyle = 'rgba(0,0,0,1)';
      tc.fill();
    });
    tc.globalCompositeOperation = 'source-over';
  }

  // 4. Clip to land only
  tc.globalCompositeOperation = 'destination-in';
  tc.drawImage(maskCanvas, 0, 0);

  // 5. Blit onto main canvas
  ctx.drawImage(tmp, 0, 0);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  zones.forEach(z => {
    if (!z.paths.length) return;
    const fillColor = hexToRgba(z.color, z.opacity / 100);
    const strokeColor = hexToRgba(z.color, Math.min(1, z.opacity / 100 + 0.35));

    z.paths.forEach(pts => {
      if (pts.length < 2) return;
      renderZoneWithLandClip(pts, fillColor, strokeColor, z.stroke, z.erasePaths || []);
    });
  });
}

function renderCurrentPath() {
  if (currentPath.length < 2) return;
  const z = zones[activeZoneIdx];

  if (tool === 'erase') {
    // Show erase preview: red semi-transparent overlay with hatching
    buildSmoothedPath(ctx, currentPath);
    ctx.closePath();
    ctx.fillStyle = 'rgba(180,30,30,0.25)';
    ctx.fill();
    buildSmoothedPath(ctx, currentPath);
    ctx.strokeStyle = 'rgba(200,40,40,0.85)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    const fillColor = hexToRgba(z.color, (z.opacity / 100) * 0.6);
    const strokeColor = hexToRgba(z.color, 0.9);
    renderZoneWithLandClip(currentPath, fillColor, strokeColor, z.stroke, []);
    buildSmoothedPath(ctx, currentPath);
    ctx.strokeStyle = hexToRgba(z.color, 0.5);
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ── Legend ─────────────────────────────────────────────────────────────────
function updateLegend() {
  const legend = document.getElementById('map-legend');
  const items = document.getElementById('legend-items');
  const withPaths = zones.filter(z => z.paths.length > 0);
  if (!withPaths.length) { legend.style.display = 'none'; return; }
  legend.style.display = 'block';
  items.innerHTML = withPaths.map(z => `
    <div class="legend-item">
      <div class="legend-swatch" style="background:${hexToRgba(z.color, z.opacity/100)};border:1.5px solid ${z.color}"></div>
      ${z.name}
    </div>`).join('');
}

// ── Actions ────────────────────────────────────────────────────────────────
function undoLast() {
  const z = zones[activeZoneIdx];
  if (!z) return;
  // Undo whichever was added most recently: erase or draw
  if (tool === 'erase' && z.erasePaths && z.erasePaths.length) {
    z.erasePaths.pop(); render(); showToast('Undid last erase');
  } else if (z.paths.length) {
    z.paths.pop(); updateLegend(); render(); showToast('Undid last region');
  }
}

function clearAll() {
  if (!confirm('Clear all drawn regions?')) return;
  zones.forEach(z => { z.paths = []; z.erasePaths = []; });
  render();
  updateLegend();
  showToast('Cleared all regions');
}

function exportPNG() {
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = img.naturalWidth || canvas.width;
  exportCanvas.height = img.naturalHeight || canvas.height;
  const ec = exportCanvas.getContext('2d');

  // Draw base map at full native resolution
  if (img.naturalWidth) {
    ec.drawImage(img, 0, 0, exportCanvas.width, exportCanvas.height);
  }

  // Build a full-res mask canvas
  const expMask = document.createElement('canvas');
  expMask.width = exportCanvas.width;
  expMask.height = exportCanvas.height;
  const em = expMask.getContext('2d');
  em.drawImage(img, 0, 0, expMask.width, expMask.height);

  // The drawn points are in canvas display-space, where the image is
  // letterboxed inside imgBounds. To convert to native image coords:
  //   1. Subtract the imgBounds offset (pan-adjusted) to get image-relative px
  //   2. Divide by imgBounds.scale to get native image px
  const offsetX = imgBounds.x + pan.x;
  const offsetY = imgBounds.y + pan.y;
  const dispScale = imgBounds.scale; // display px per native px

  function toNative(pts) {
    return pts.map(p => ({
      x: (p.x - offsetX) / dispScale,
      y: (p.y - offsetY) / dispScale
    }));
  }

  // Build path helper for export context
  function buildPath(c, spts) {
    if (spts.length < 2) return;
    c.beginPath();
    c.moveTo(spts[0].x, spts[0].y);
    for (let i = 1; i < spts.length - 2; i++) {
      const xc = (spts[i].x + spts[i+1].x) / 2;
      const yc = (spts[i].y + spts[i+1].y) / 2;
      c.quadraticCurveTo(spts[i].x, spts[i].y, xc, yc);
    }
    const last = spts[spts.length-1], prev = spts[spts.length-2];
    c.quadraticCurveTo(prev.x, prev.y, last.x, last.y);
  }

  zones.forEach(z => {
    if (!z.paths.length) return;
    const fillColor = hexToRgba(z.color, z.opacity / 100);
    const strokeColor = hexToRgba(z.color, Math.min(1, z.opacity / 100 + 0.35));
    // Stroke width: drawn at display scale, convert back to native px
    const nativeStroke = z.stroke / dispScale;

    z.paths.forEach(pts => {
      if (pts.length < 2) return;
      const native = toNative(pts);

      const tmp = document.createElement('canvas');
      tmp.width = exportCanvas.width;
      tmp.height = exportCanvas.height;
      const tc = tmp.getContext('2d');

      buildPath(tc, native);
      tc.closePath();
      tc.fillStyle = fillColor;
      tc.fill();

      buildPath(tc, native);
      tc.closePath();
      tc.strokeStyle = strokeColor;
      tc.lineWidth = nativeStroke;
      tc.lineJoin = 'round';
      tc.lineCap = 'round';
      tc.stroke();

      // Punch out erase paths
      if (z.erasePaths && z.erasePaths.length) {
        tc.globalCompositeOperation = 'destination-out';
        z.erasePaths.forEach(ep => {
          if (ep.length < 2) return;
          buildPath(tc, toNative(ep));
          tc.closePath();
          tc.fillStyle = 'rgba(0,0,0,1)';
          tc.fill();
        });
        tc.globalCompositeOperation = 'source-over';
      }

      // Clip to land
      tc.globalCompositeOperation = 'destination-in';
      tc.drawImage(expMask, 0, 0);

      ec.drawImage(tmp, 0, 0);
    });
  });

  const link = document.createElement('a');
  link.download = 'grassseed-zones.png';
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
  showToast('Map exported!');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
updateOpacityLabel();
</script>
</body>
</html>
